# =============================================================
# Tailscale Sidecar — Userspace mode in vCluster
# No NET_ADMIN, no custom dnsPolicy
# DNS resolved by sidecar via SOCKS5 proxy
# =============================================================
#
# Create auth secret in your app namespace:
#
#   kubectl create secret generic tailscale-auth \
#     -n tailscale \
#     --from-literal=TS_AUTHKEY="tskey-client-$(kubectl get secret operator-oauth -n tailscale -o jsonpath='{.data.client_id}' | base64 -d)-$(kubectl get secret operator-oauth -n tailscale -o jsonpath='{.data.client_secret}' | base64 -d)"
#

# --- RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: tailscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: tailscale
rules:
- apiGroups: [ "" ]
  resources: [ "secrets" ]
  verbs: [ "create" ]
- apiGroups: [ "" ]
  resources: [ "secrets" ]
  resourceNames: [ "ts-sidecar-state" ]
  verbs: [ "get", "update", "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: tailscale
subjects:
- kind: ServiceAccount
  name: tailscale
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      serviceAccountName: tailscale
      # No custom dnsPolicy — use default cluster DNS
      containers:
      # ---- App container ----
      - name: app
        image: registry.v2.formance.dev/formancehq/internal-tool:latest
        command: [ "sleep", "infinity" ]

      # ---- Tailscale sidecar ----
      - name: ts-sidecar
        image: ghcr.io/tailscale/tailscale:latest
        imagePullPolicy: Always
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: operator-oauth
              key: client_secret
        - name: TS_KUBE_SECRET
          value: "ts-sidecar-state"
        - name: TS_HOSTNAME
          value: "internal-control-plane"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_SOCKS5_SERVER
          value: "0.0.0.0:1055"
        - name: TS_OUTBOUND_HTTP_PROXY_LISTEN
          value: "0.0.0.0:1080"
        - name: TS_ACCEPT_DNS
          value: "true"
        - name: TS_EXTRA_ARGS
          value: "--advertise-tags=tag:k8s-operator"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
